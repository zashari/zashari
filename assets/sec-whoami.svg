<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 282" width="100%" preserveAspectRatio="xMidYMin meet" role="img" aria-label="~/whoami terminal">
  <defs>
    <clipPath id="cw">
      <rect x="0" y="0" width="960" height="282" rx="10" />
    </clipPath>
    <style><![CDATA[
      .cur { animation: blkw 1.1s steps(1) infinite; }
      @keyframes blkw { 50% { opacity: 0; } }
    ]]></style>
  </defs>

  <g clip-path="url(#cw)">
    <rect x="0" y="0"  width="960" height="38"  fill="#1a1a1a" />
    <rect x="0" y="38" width="960" height="244" fill="#0d1117" />
  </g>

  <!-- traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57" />
  <circle cx="40" cy="19" r="6" fill="#febc2e" />
  <circle cx="60" cy="19" r="6" fill="#28c840" />

  <!-- title bar text -->
  <text x="480" y="23" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6e7681">zashari@dev &#8212; whoami</text>
  <text x="940" y="23" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6b7280">// who is this guy?</text>

  <!-- title bar divider -->
  <line x1="0" y1="38.5" x2="960" y2="38.5" stroke="#2d2d2d" stroke-width="1" />

  <!-- prompt -->
  <text x="24" y="72" xml:space="preserve"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/whoami</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan fill="#c9d1d9">cat </tspan><tspan fill="#60a5fa">about.txt</tspan>
  </text>

  <!-- yaml content -->
  <text x="24" y="106" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">name</tspan><tspan fill="#6e7681">      : </tspan><tspan fill="#c9d1d9">Andi Izzat Zaky Ashari</tspan>
  </text>
  <text x="24" y="128" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">role</tspan><tspan fill="#6e7681">      : </tspan><tspan fill="#c9d1d9">AI Engineer  &#183;  Software Engineer  &#183;  Software Architect</tspan>
  </text>
  <text x="24" y="150" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">currently</tspan><tspan fill="#6e7681"> : </tspan><tspan fill="#c9d1d9">Full-Stack Software Engineer  @  </tspan><tspan fill="#ff8c42">[REDACTED]</tspan>
  </text>
  <text x="24" y="172" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#c9d1d9">            Software Architect            @  </tspan><tspan fill="#ff8c42">[REDACTED]</tspan>
  </text>
  <text x="24" y="194" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">location</tspan><tspan fill="#6e7681">  : </tspan><tspan fill="#c9d1d9">Bandung, Indonesia  &#183;  remote</tspan>
  </text>
  <text x="24" y="216" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">education</tspan><tspan fill="#6e7681"> : </tspan><tspan fill="#c9d1d9">B.Sc. Computer Science, BINUS University (2021 &#8211; 2025)</tspan>
  </text>
  <text x="24" y="238" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">focus</tspan><tspan fill="#6e7681">     : </tspan><tspan fill="#c9d1d9">AI/ML  &#183;  full-stack  &#183;  cloud infrastructure  &#183;  LLM platforms</tspan>
  </text>

  <!-- trailing prompt with blinking cursor (tspan-positioned so it always follows the prompt text) -->
  <text x="24" y="266" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/whoami</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan class="cur" fill="#ff8c42">&#9608;</tspan>
  </text>

  <!-- outer border -->
  <rect x="0.5" y="0.5" width="959" height="281" rx="10" fill="none" stroke="#2d2d2d" stroke-width="1" />
</svg>
