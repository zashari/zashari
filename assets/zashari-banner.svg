<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 684 264" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ZASHARI">

<defs>
  <style><![CDATA[
    .p {
      fill: #7ee787;
      animation: cyc 6s cubic-bezier(0.45, 0, 0.2, 1) infinite;
      will-change: transform, opacity;
    }
    @keyframes cyc {
      0%   { transform: translate(var(--dx), var(--dy)); opacity: 0.18; }
      22%  { transform: translate(0, 0);                 opacity: 1;    }
      72%  { transform: translate(0, 0);                 opacity: 1;    }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0.18; }
    }
    /* glow particles get a deeper hue for variety */
    .g  { fill: #58a6ff; }
  ]]></style>
</defs>

