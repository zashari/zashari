<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 308" width="100%" preserveAspectRatio="xMidYMin meet" role="img" aria-label="~/stack terminal">
  <defs>
    <clipPath id="cs">
      <rect x="0" y="0" width="960" height="308" rx="10" />
    </clipPath>
    <style><![CDATA[
      .cur { animation: blks 1.1s steps(1) infinite; }
      @keyframes blks { 50% { opacity: 0; } }
    ]]></style>
  </defs>

  <g clip-path="url(#cs)">
    <rect x="0" y="0"  width="960" height="38"  fill="#1a1a1a" />
    <rect x="0" y="38" width="960" height="270" fill="#0d1117" />
  </g>

  <!-- traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57" />
  <circle cx="40" cy="19" r="6" fill="#febc2e" />
  <circle cx="60" cy="19" r="6" fill="#28c840" />

  <!-- title bar text -->
  <text x="480" y="23" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6e7681">zashari@dev &#8212; stack</text>
  <text x="940" y="23" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6b7280">// tools of the trade</text>

  <line x1="0" y1="38.5" x2="960" y2="38.5" stroke="#2d2d2d" stroke-width="1" />

  <!-- prompt -->
  <text x="24" y="72" xml:space="preserve"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/stack</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan fill="#c9d1d9">ls </tspan><tspan fill="#facc15">--grouped</tspan>
  </text>

  <!-- 6 categories, each: orange tab marker | label | items -->
  <!-- y baselines: 110, 138, 166, 194, 222, 250 (28px step). tab marker top = baseline - 14. -->

  <rect x="24" y="96"  width="3" height="18" fill="#ff8c42" />
  <text x="40" y="110" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#facc15">languages</text>
  <text x="190" y="110" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#c9d1d9">TypeScript  &#183;  JavaScript  &#183;  Python  &#183;  Go  &#183;  SQL  &#183;  R</text>

  <rect x="24" y="124" width="3" height="18" fill="#ff8c42" />
  <text x="40" y="138" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#facc15">frontend</text>
  <text x="190" y="138" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#c9d1d9">React  &#183;  Next.js  &#183;  Tailwind CSS  &#183;  HTML / CSS</text>

  <rect x="24" y="152" width="3" height="18" fill="#ff8c42" />
  <text x="40" y="166" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#facc15">backend</text>
  <text x="190" y="166" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#c9d1d9">Node.js  &#183;  Bun  &#183;  Elysia.js  &#183;  REST  &#183;  Socket.IO / WS</text>

  <rect x="24" y="180" width="3" height="18" fill="#ff8c42" />
  <text x="40" y="194" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#facc15">ai &#183; ml</text>
  <text x="190" y="194" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#c9d1d9">TensorFlow  &#183;  PyTorch  &#183;  OpenAI  &#183;  Gemini  &#183;  MCP  &#183;  Deep Learning</text>

  <rect x="24" y="208" width="3" height="18" fill="#ff8c42" />
  <text x="40" y="222" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#facc15">data</text>
  <text x="190" y="222" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#c9d1d9">PostgreSQL  &#183;  MongoDB  &#183;  Supabase  &#183;  Redis</text>

  <rect x="24" y="236" width="3" height="18" fill="#ff8c42" />
  <text x="40" y="250" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#facc15">cloud</text>
  <text x="190" y="250" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#c9d1d9">AWS  &#183;  GCP  &#183;  Cloudflare  &#183;  Docker Swarm  &#183;  Terraform  &#183;  GitHub Actions</text>

  <!-- trailing prompt with blinking cursor (tspan-positioned so it always follows the prompt text) -->
  <text x="24" y="290" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/stack</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan class="cur" fill="#ff8c42">&#9608;</tspan>
  </text>

  <!-- outer border -->
  <rect x="0.5" y="0.5" width="959" height="307" rx="10" fill="none" stroke="#2d2d2d" stroke-width="1" />
</svg>
