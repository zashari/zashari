<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 64" width="760" height="64" role="img" aria-label="terminal: whoami → cycling roles">
  <defs>
    <style>
      .bg        { fill: #0d1117; }
      .border    { fill: none; stroke: #21262d; stroke-width: 1; }
      .mono      { font-family: 'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace; font-size: 14px; }
      .prompt    { fill: #ff8c42; }
      .text      { fill: #c9d1d9; }
      .dim       { fill: #6e7681; }
      .accent    { fill: #60a5fa; }
      .magenta   { fill: #c084fc; }
      .yellow    { fill: #facc15; }

      .role      { opacity: 0; }
      .r1        { animation: cyc 16s linear infinite;            }
      .r2        { animation: cyc 16s linear infinite;  animation-delay: 4s;  }
      .r3        { animation: cyc 16s linear infinite;  animation-delay: 8s;  }
      .r4        { animation: cyc 16s linear infinite;  animation-delay: 12s; }
      @keyframes cyc {
        0%    { opacity: 0; }
        2%    { opacity: 1; }
        23%   { opacity: 1; }
        25%   { opacity: 0; }
        100%  { opacity: 0; }
      }

      .cursor    { fill: #ff8c42; animation: blink 1.05s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <rect class="bg"     x="0.5"   y="0.5"   width="759" height="63" rx="8" />
  <rect class="border" x="0.5"   y="0.5"   width="759" height="63" rx="8" />
  <circle cx="20" cy="20" r="5" fill="#ff5f57" />
  <circle cx="38" cy="20" r="5" fill="#febc2e" />
  <circle cx="56" cy="20" r="5" fill="#28c840" />
  <text class="mono dim" x="380" y="24" text-anchor="middle">zashari@dev — zsh</text>

  <text class="mono" x="20" y="52">
    <tspan class="prompt">~/zashari</tspan><tspan class="dim"> ❯ </tspan><tspan class="text">whoami</tspan><tspan class="accent">  →  </tspan>
  </text>

  <text class="mono text role r1" x="218" y="52">AI Engineer</text>
  <text class="mono text role r2" x="218" y="52">Software Engineer</text>
  <text class="mono text role r3" x="218" y="52">Software Architect</text>
  <text class="mono text role r4" x="218" y="52">Full-Stack Developer</text>

  <rect class="cursor" x="400" y="40" width="8" height="14" />

  <text class="mono dim" x="740" y="52" text-anchor="end">
    <tspan class="yellow">●</tspan> building<tspan class="dim"> · </tspan><tspan class="magenta">●</tspan> shipping
  </text>
</svg>
