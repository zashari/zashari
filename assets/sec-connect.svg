<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 116" width="100%" preserveAspectRatio="xMidYMin meet" role="img" aria-label="zashari@dev — connect">
  <defs>
    <clipPath id="cc">
      <rect x="0" y="0" width="960" height="116" rx="10" />
    </clipPath>
  </defs>

  <g clip-path="url(#cc)">
    <rect x="0" y="0"  width="960" height="38" fill="#1a1a1a" />
    <rect x="0" y="38" width="960" height="78" fill="#0d1117" />
  </g>

  <!-- traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57" />
  <circle cx="40" cy="19" r="6" fill="#febc2e" />
  <circle cx="60" cy="19" r="6" fill="#28c840" />

  <!-- title bar text -->
  <text x="480" y="23" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6e7681">zashari@dev &#8212; connect</text>
  <text x="940" y="23" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6b7280">// let&#39;s talk</text>

  <line x1="0" y1="38.5" x2="960" y2="38.5" stroke="#2d2d2d" stroke-width="1" />

  <!-- prompt -->
  <text x="24" y="72" xml:space="preserve"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/connect</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan fill="#c9d1d9">ssh </tspan><tspan fill="#c084fc">me@zashari</tspan>
  </text>

  <!-- helper hint -->
  <text x="24" y="100" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#6e7681">// pick a channel below &#8595;</text>

  <!-- trailing cursor -->
  <rect x="240" y="89" width="8" height="14" fill="#ff8c42">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" />
  </rect>

  <!-- outer border -->
  <rect x="0.5" y="0.5" width="959" height="115" rx="10" fill="none" stroke="#2d2d2d" stroke-width="1" />
</svg>
