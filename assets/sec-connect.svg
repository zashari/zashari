<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 252" width="100%" preserveAspectRatio="xMidYMin meet" role="img" aria-label="zashari@dev — connect">
  <defs>
    <clipPath id="cc">
      <rect x="0" y="0" width="960" height="252" rx="10" />
    </clipPath>
  </defs>

  <g clip-path="url(#cc)">
    <rect x="0" y="0"  width="960" height="38"  fill="#1a1a1a" />
    <rect x="0" y="38" width="960" height="214" fill="#0d1117" />
  </g>

  <!-- traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57" />
  <circle cx="40" cy="19" r="6" fill="#febc2e" />
  <circle cx="60" cy="19" r="6" fill="#28c840" />

  <!-- title bar text -->
  <text x="480" y="23" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6e7681">zashari@dev &#8212; connect</text>
  <text x="940" y="23" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6b7280">// let&#39;s talk</text>

  <line x1="0" y1="38.5" x2="960" y2="38.5" stroke="#2d2d2d" stroke-width="1" />

  <!-- prompt -->
  <text x="24" y="72" xml:space="preserve"
        font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/connect</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan fill="#c9d1d9">ssh </tspan><tspan fill="#c084fc">me@zashari</tspan>
  </text>

  <!-- entries -->
  <text x="40" y="108" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">linkedin</tspan><tspan fill="#6e7681">    :  </tspan><tspan fill="#60a5fa">zaky_ashari</tspan><tspan fill="#6e7681">            linkedin.com/in/zaky-ashari-81143b217</tspan>
  </text>
  <text x="40" y="132" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">github</tspan><tspan fill="#6e7681">      :  </tspan><tspan fill="#60a5fa">zashari</tspan><tspan fill="#6e7681">                github.com/zashari</tspan>
  </text>
  <text x="40" y="156" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">email</tspan><tspan fill="#6e7681">       :  </tspan><tspan fill="#60a5fa">izzat.zaky@gmail.com</tspan>
  </text>
  <text x="40" y="180" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#facc15">instagram</tspan><tspan fill="#6e7681">   :  </tspan><tspan fill="#60a5fa">a.zakyashari</tspan><tspan fill="#6e7681">           instagram.com/a.zakyashari</tspan>
  </text>

  <!-- trailing prompt with blinking cursor (tspan-positioned so it always follows the prompt text) -->
  <text x="24" y="220" xml:space="preserve" font-family="'JetBrains Mono','Fira Code','SF Mono','Menlo','Consolas',monospace" font-size="14">
    <tspan fill="#ff8c42">~/connect</tspan><tspan fill="#6e7681"> &#10095; </tspan><tspan fill="#ff8c42">&#9608;<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></tspan>
  </text>

  <!-- outer border -->
  <rect x="0.5" y="0.5" width="959" height="251" rx="10" fill="none" stroke="#2d2d2d" stroke-width="1" />
</svg>
